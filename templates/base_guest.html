<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ruang Dengar{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(90,80,155,0.08);
            padding: 32px 28px;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #5a509b;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="auth-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
