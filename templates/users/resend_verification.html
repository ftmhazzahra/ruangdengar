{% extends 'base_guest.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Kirim Ulang Email Verifikasi</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="Masukkan email yang belum diverifikasi">
        </div>
        <button type="submit" class="btn btn-primary mt-2">Kirim Ulang Email Verifikasi</button>
    </form>
    <div class="mt-3">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
