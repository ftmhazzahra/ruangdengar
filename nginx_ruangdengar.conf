# ==========================================
# NGINX Configuration for Ruang Dengar
# ==========================================
# Location: /etc/nginx/sites-available/ruangdengar
# 
# Setup:
# 1. Copy this file to /etc/nginx/sites-available/ruangdengar
# 2. Edit paths below (replace /path/to/project)
# 3. Create symlink: sudo ln -s /etc/nginx/sites-available/ruangdengar /etc/nginx/sites-enabled/
# 4. Test config: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ruangdengar.cloud www.ruangdengar.cloud;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ruangdengar.cloud www.ruangdengar.cloud;
    
    # ==================== SSL Configuration ====================
    # Generated by Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/ruangdengar.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruangdengar.cloud/privkey.pem;
    
    # SSL protocols and ciphers (modern configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # ==================== Server Configuration ====================
    # Max upload size (untuk media files)
    client_max_body_size 50M;
    
    # Project paths (EDIT THESE!)
    set $project_dir /path/to/project;
    set $venv_dir /path/to/venv;
    
    # ==================== Static Files ====================
    location /static/ {
        alias $project_dir/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ==================== Media Files ====================
    location /media/ {
        alias $project_dir/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # ==================== Django Application ====================
    location / {
        # Proxy to Gunicorn
        proxy_pass http://unix:/tmp/ruangdengar.sock;
        
        # Required proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection timeout
        proxy_connect_timeout 120;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        
        # Disable buffering for streaming
        proxy_buffering off;
    }
    
    # ==================== Logging ====================
    access_log /var/log/nginx/ruangdengar_access.log;
    error_log /var/log/nginx/ruangdengar_error.log;
}
